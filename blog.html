<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Language Learning | Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <a class="logo" href="index.html" aria-label="Language Learning Home">Language Learning</a>
        <button class="nav__toggle" aria-expanded="false" aria-controls="primary-nav">
          <span class="sr-only">Toggle navigation</span>
          <span class="burger" aria-hidden="true"></span>
        </button>
        <nav id="primary-nav" class="nav__menu" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="blog.html" class="is-active">Blog</a>
          <a href="about.html">About Me</a>
          <a href="offer.html">Offer</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section section--cream">
        <div class="container flex-between">
          <h1>Blog</h1>
          <button id="createPostBtn" class="btn">Create Post</button>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div id="postsContainer" class="cards" aria-live="polite"></div>
        </div>
      </section>

      <div id="postModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal__backdrop" data-close-modal></div>
        <div class="modal__content" role="document">
          <button class="modal__close" id="closeModalBtn" aria-label="Close create post form">×</button>
          <h2 id="modalTitle">Create a New Post</h2>
          <form id="postForm" class="form" novalidate>
            <div class="form__field">
              <label for="postTitle">Title</label>
              <input type="text" id="postTitle" name="title" required placeholder="Enter post title" />
            </div>
            <div class="form__field">
              <label for="postContent">Content</label>
              <textarea id="postContent" name="content" rows="6" required placeholder="Write your content..."></textarea>
            </div>
            <div class="form__field">
              <label for="postImage">Optional Image</label>
              <input type="file" id="postImage" name="image" accept="image/*" />
            </div>
            <div class="form__actions">
              <button type="submit" class="btn">Publish</button>
              <button type="button" class="btn btn--secondary" id="cancelPostBtn">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>© 2025 Language Learning Blog</p>
      </div>
    </footer>
  </body>
  </html>
