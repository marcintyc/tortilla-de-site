<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog - Porady o Języku Hiszpańskim | Hiszpańska Literka</title>
    <meta name="description" content="Blog o nauce języka hiszpańskiego. Porady, wskazówki, ciekawostki i materiały do nauki." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <a class="logo" href="index.html" aria-label="Strona główna">Hiszpańska Literka</a>
        <button class="nav__toggle" aria-expanded="false" aria-controls="primary-nav">
          <span class="sr-only">Toggle navigation</span>
          <span class="burger" aria-hidden="true"></span>
        </button>
        <nav id="primary-nav" class="nav__menu" aria-label="Główna nawigacja">
          <a href="index.html">Start</a>
          <a href="blog.html" class="is-active">Blog</a>
          <a href="about.html">O mnie</a>
          <a href="offer.html">Oferta</a>
          <a href="contact.html">Kontakt</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section" style="background: linear-gradient(135deg, var(--cream) 0%, var(--beige-light) 100%); padding: 5rem 0 4rem;">
        <div class="container flex-between">
          <div>
            <h1 style="font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 1rem; color: var(--dark-brown);">Blog o języku hiszpańskim</h1>
            <p style="font-size: 1.15rem; color: var(--text-light); margin: 0; line-height: 1.8;">
              Porady, wskazówki i ciekawostki dla każdego, kto uczy się hiszpańskiego
            </p>
          </div>
          <button id="createPostBtn" class="btn"><span>Nowy wpis</span></button>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div id="postsContainer" class="cards" aria-live="polite"></div>
        </div>
      </section>

      <div id="postModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal__backdrop" data-close-modal></div>
        <div class="modal__content" role="document">
          <button class="modal__close" id="closeModalBtn" aria-label="Zamknij formularz">×</button>
          <h2 id="modalTitle" style="color: var(--dark-brown);">Utwórz nowy wpis</h2>
          <form id="postForm" class="form" novalidate>
            <div class="form__field">
              <label for="postTitle">Tytuł</label>
              <input type="text" id="postTitle" name="title" required placeholder="Wpisz tytuł..." />
            </div>
            <div class="form__field">
              <label for="postContent">Treść</label>
              <textarea id="postContent" name="content" rows="8" required placeholder="Napisz treść wpisu..."></textarea>
            </div>
            <div class="form__field">
              <label for="postImage">Zdjęcie (opcjonalne)</label>
              <input type="file" id="postImage" name="image" accept="image/*" />
            </div>
            <div class="form__actions">
              <button type="submit" class="btn"><span>Opublikuj</span></button>
              <button type="button" class="btn btn--secondary" id="cancelPostBtn"><span>Anuluj</span></button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>© 2025 Hiszpańska Literka | Wszystkie prawa zastrzeżone</p>
      </div>
    </footer>
  </body>
</html>
