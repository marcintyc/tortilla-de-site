<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Journal - Español Élégant</title>
    <meta name="description" content="Insights, perspectives, and cultural explorations in Spanish language learning." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <a class="logo" href="index.html" aria-label="Home - Español Élégant">ESPAÑOL</a>
        <button class="nav__toggle" aria-expanded="false" aria-controls="primary-nav">
          <span class="sr-only">Toggle navigation</span>
          <span class="burger" aria-hidden="true"></span>
        </button>
        <nav id="primary-nav" class="nav__menu" aria-label="Główna nawigacja">
          <a href="index.html">Home</a>
          <a href="blog.html" class="is-active">Journal</a>
          <a href="about.html">About</a>
          <a href="offer.html">Services</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section" style="background: linear-gradient(to bottom, var(--white) 0%, var(--cream) 100%); padding: 6rem 0 4rem;">
        <div class="container flex-between">
          <div>
            <h1 style="font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 300; font-style: italic; margin-bottom: 1rem; line-height: 1.2;">Our Journal</h1>
            <p style="font-size: 1.15rem; color: var(--charcoal); margin: 0; font-weight: 300; line-height: 1.8;">
              Perspectives, insights, and cultural explorations in Spanish language mastery
            </p>
          </div>
          <button id="createPostBtn" class="btn"><span>New Entry</span></button>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <div id="postsContainer" class="cards" aria-live="polite"></div>
        </div>
      </section>

      <div id="postModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal__backdrop" data-close-modal></div>
        <div class="modal__content" role="document">
          <button class="modal__close" id="closeModalBtn" aria-label="Zamknij formularz">×</button>
          <h2 id="modalTitle" style="font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic;">Create New Entry</h2>
          <form id="postForm" class="form" novalidate>
            <div class="form__field">
              <label for="postTitle">Title</label>
              <input type="text" id="postTitle" name="title" required placeholder="Enter title..." />
            </div>
            <div class="form__field">
              <label for="postContent">Content</label>
              <textarea id="postContent" name="content" rows="8" required placeholder="Write your entry..."></textarea>
            </div>
            <div class="form__field">
              <label for="postImage">Image (Optional)</label>
              <input type="file" id="postImage" name="image" accept="image/*" />
            </div>
            <div class="form__actions">
              <button type="submit" class="btn"><span>Publish</span></button>
              <button type="button" class="btn btn--secondary" id="cancelPostBtn"><span>Cancel</span></button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>© 2025 Español Élégant · All Rights Reserved</p>
      </div>
    </footer>
  </body>
</html>
